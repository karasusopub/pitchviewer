<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Pitch Viewer (Fixed 8 Octaves & 1.5 Octave View)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: sans-serif; background: #222; color: #eee; margin:0; }

  #controls {
    padding: 10px;
    background: #333;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  #controls button, #controls input[type=file] {
    font-size: 18px;
    padding: 10px 20px;
    background: #555;
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
  }
  #controls button:disabled {
    background: #222;
    color: #555;
    cursor: not-allowed;
  }

  #recIndicator {
    display:none;
    color:#ff4444;
    font-size:22px;
    font-weight:bold;
    padding:10px;
    text-align:center;
  }

  #progressContainer {
    width: 100%;
    height: 20px;
    background: #444;
    border: 1px solid #666;
    display: none;
  }
  #progressBar {
    width: 0%;
    height: 100%;
    background: #0af;
    transition: width 0.1s linear;
  }

  #container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 180px);
  }

  /* 横スクロール（時間軸）エリア */
  #scrollAreaX {
    overflow-x: auto;
    width: 100%;
    touch-action: pan-x pan-y;
  }

  /* タイムラインヘッダー（左側にキーボード分の80pxを確保） */
  #timelineHeader {
    display: flex;
    flex-direction: row;
    background: #222;
  }
  #timelineSpacer {
    width: 80px;
    flex-shrink: 0;
    border-right: 2px solid #444;
    background: #111;
  }

  /* 【最重要】VIEW矩形：常に1オクターブ半（18行×20px ＝ 360px）の高さに固定 */
  #scrollAreaY {
    overflow-y: scroll; 
    height: 360px;       
    display: flex;
    flex-direction: row;
    border-bottom: 2px solid #444;
  }

  #keyboard {
    width: 80px;
    background: #111;
    border-right: 2px solid #444;
    flex-shrink: 0;
  }

  #pianoWrapper {
    display: flex;
    flex-direction: column;
  }

  canvas {
    display: block;
  }

  #errorArea {
    width: 100%;
  }
</style>
</head>
<body>

<div id="controls">
  <button id="micStartBtn">🎤 録音開始</button>
  <button id="micStopBtn" disabled>■ 録音停止</button>
  <button id="playBtn" disabled>▶ 再生</button>
  <button id="pauseBtn" disabled>一時停止</button>
  <button id="stopBtn" disabled>停止</button>

  <input type="file" id="fileInput" accept="audio/*">
</div>

<div id="recIndicator">● REC</div>

<div id="progressContainer"><div id="progressBar"></div></div>

<div id="container">
  <div id="scrollAreaX">
    
    <div id="timelineHeader">
      <div id="timelineSpacer"></div>
      <canvas id="timeline" height="40"></canvas>
    </div>
    
    <div id="scrollAreaY">
      <div id="keyboard"><canvas id="keys"></canvas></div>
      <div id="pianoWrapper">
        <canvas id="pianoroll"></canvas>
      </div>
    </div>

    <div id="errorArea">
      <canvas id="error" height="200"></canvas>
    </div>

  </div>
</div>

<script>
let audioCtx = null;
let audioBuffer = null;
let sourceNode = null;
let isPaused = false;
let pauseOffset = 0;
let startTime = 0;
let animationId = null;

let notes = [];
let longNotes = [];
let errors = [];
let timeMax = 10; // デフォルト10秒（解析後に変動）
let maxCent = 100;

// 【仕様固定】1オクターブ（C0:12）から 8オクターブ（C8:108）までを網羅
const minMidi = 12;
const maxMidi = 108;
const rowHeight = 20; // 1行20px固定（18行で360px＝1オクターブ半）
const totalRows = maxMidi - minMidi + 1;
const rollHeight = rowHeight * totalRows; // 97行×20px = 1940pxの巨大キャンバス

let micStream = null;
let micRecorder = null;
let micChunks = [];
let recBlinkInterval = null;

const MIC_LIMIT = 10 * 1000;

const micStartBtn = document.getElementById("micStartBtn");
const micStopBtn = document.getElementById("micStopBtn");
const fileInput = document.getElementById("fileInput");

const playBtn = document.getElementById("playBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");

const recIndicator = document.getElementById("recIndicator");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");

const keysCanvas = document.getElementById("keys");
const keysCtx = keysCanvas.getContext("2d");
const timelineCanvas = document.getElementById("timeline");
const timelineCtx = timelineCanvas.getContext("2d");
const rollCanvas = document.getElementById("pianoroll");
const rollCtx = rollCanvas.getContext("2d");
const errorCanvas = document.getElementById("error");
const errorCtx = errorCanvas.getContext("2d");
const scrollAreaY = document.getElementById("scrollAreaY");

// 【初期化】起動時にキャンバスサイズを確定させ、C4を画面中央にする
window.addEventListener("DOMContentLoaded", () => {
  initCanvasDimensions(1200); // 初期横幅
  drawKeyboard();
  drawTimeline();
  drawPianoRoll();
  drawErrorGraph();
  scrollToCenterMidi(60); // C4(MIDI 60)を画面中央に
});

function initCanvasDimensions(width) {
  keysCanvas.width = 80;
  keysCanvas.height = rollHeight;
  timelineCanvas.width = width;
  rollCanvas.width = width;
  rollCanvas.height = rollHeight;
  errorCanvas.width = width;
}

// 特定のMIDIノートを360pxのVIEWの中央にスクロールする関数
function scrollToCenterMidi(midi) {
  // 上からのピクセル位置。maxMidiが一番上
  const targetY = (maxMidi - midi) * rowHeight;
  // VIEWの高さ(360px)の半分(180px)だけ引いて中央に寄せる
  scrollAreaY.scrollTop = Math.max(0, targetY - 180 + (rowHeight / 2));
}

fileInput.addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  const arrayBuffer = await file.arrayBuffer();
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  analyzeAudio(audioBuffer);
});

// カウントダウン付き録音
micStartBtn.addEventListener("click", async () => {
  micStartBtn.disabled = true;
  let count = 3;
  micStartBtn.textContent = `⏳ ${count}...`;
  
  const countdownInterval = setInterval(() => {
    count--;
    if (count > 0) {
      micStartBtn.textContent = `⏳ ${count}...`;
    } else {
      clearInterval(countdownInterval);
      micStartBtn.textContent = `🎤 録音開始`;
      startActualRecording();
    }
  }, 1000);
});

async function startActualRecording() {
  micStopBtn.disabled = false;
  micChunks = [];
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micRecorder = new MediaRecorder(micStream);
  } catch (err) {
    alert("マイクのアクセスに失敗しました: " + err.message);
    micStartBtn.disabled = false;
    micStopBtn.disabled = true;
    return;
  }

  micRecorder.ondataavailable = e => micChunks.push(e.data);
  micRecorder.start();

  recIndicator.style.display = "block";
  recBlinkInterval = setInterval(() => {
    recIndicator.style.visibility =
      (recIndicator.style.visibility === "hidden") ? "visible" : "hidden";
  }, 500);

  setTimeout(() => {
    if (micRecorder && micRecorder.state === "recording") micRecorder.stop();
  }, MIC_LIMIT);

  micRecorder.onstop = async () => {
    micStopBtn.disabled = true;
    micStartBtn.disabled = false;

    recIndicator.style.display = "none";
    recIndicator.style.visibility = "visible";
    if (recBlinkInterval) {
      clearInterval(recBlinkInterval);
      recBlinkInterval = null;
    }

    if (micStream) {
      micStream.getTracks().forEach(track => track.stop());
    }

    const blob = new Blob(micChunks, { type: "audio/webm" });
    const arrayBuffer = await blob.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    analyzeAudio(audioBuffer);
  };
}

micStopBtn.addEventListener("click", () => {
  if (micRecorder && micRecorder.state === "recording") {
    micRecorder.stop();
  }
});

async function analyzeAudio(buffer) {
  playBtn.disabled = true;
  pauseBtn.disabled = true;
  stopBtn.disabled = true;

  const sampleRate = buffer.sampleRate;
  const data = buffer.getChannelData(0);

  const frameSize = 2048;
  const hopSize = 512;

  notes = [];
  errors = [];

  progressContainer.style.display = "block";
  progressBar.style.width = "0%"

  const totalFrames = Math.floor((data.length - frameSize) / hopSize);
  let processedFrames = 0;

  for (let i = 0; i + frameSize <= data.length; i += hopSize) {
    const frame = data.subarray(i, i + frameSize);
    const freq = yin(frame, sampleRate);
    if (freq) {
      const midi = freqToMidi(freq);
      const time = i / sampleRate;

      const noteFreq = midiToFreq(midi);
      const centError = 1200 * Math.log2(freq / noteFreq);

      // 1〜8オクターブ（minMidi〜maxMidi）の範囲内のみ記録
      if (midi >= minMidi && midi <= maxMidi) {
        notes.push({ time, midi });
        errors.push({ time, cent: centError });
      }
    }

    processedFrames++;

    if (processedFrames % 100 === 0) {
      progressBar.style.width = (processedFrames / totalFrames) * 100 + "%";
      await new Promise(resolve => setTimeout(resolve, 0));
    }
  }

  progressBar.style.width = "100%";
  setTimeout(() => progressContainer.style.display = "none", 300);

  if (notes.length === 0) {
    alert("ピッチを検出できませんでした（または想定外の音域です）。");
    // 音がなくてもC4中央で再描画
    timeMax = buffer.duration;
    initCanvasDimensions(Math.max(1200, timeMax * 200));
    drawKeyboard();
    drawTimeline();
    drawPianoRoll();
    drawErrorGraph();
    scrollToCenterMidi(60);
    return;
  }

  playBtn.disabled = false;
  pauseBtn.disabled = false;
  stopBtn.disabled = false;

  timeMax = notes[notes.length - 1].time;

  longNotes = [];
  let current = null;
  const hopTime = hopSize / sampleRate;

  for (let i = 0; i < notes.length; i++) {
    const n = notes[i];
    if (!current) {
      current = { midi: n.midi, start: n.time, end: n.time + hopTime };
      continue;
    }
    if (n.midi === current.midi) {
      current.end = n.time + hopTime;
    } else {
      longNotes.push(current);
      current = { midi: n.midi, start: n.time, end: n.time + hopTime };
    }
  }
  if (current) longNotes.push(current);

  const pxPerSec = 200;
  const width = Math.max(1200, timeMax * pxPerSec);

  // キャンバスサイズを更新（高さは常にロール高さで固定）
  initCanvasDimensions(width);

  drawKeyboard();
  drawTimeline();
  drawPianoRoll();
  drawErrorGraph();

  // 検出された音の平均値、または単音ならその音を中心にスクロール。なければC4(60)へ
  const midiValues = notes.map(n => n.midi);
  const averageMidi = midiValues.length > 0 ? (midiValues.reduce((a, b) => a + b, 0) / midiValues.length) : 60;
  scrollToCenterMidi(averageMidi);
}

playBtn.addEventListener("click", async () => {
  if (!audioCtx || !audioBuffer) return;
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  if (sourceNode) {
    sourceNode.stop();
    sourceNode.disconnect();
  }

  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(audioCtx.destination);

  sourceNode.onended = () => {
    const currentPlayhead = isPaused ? pauseOffset : audioCtx.currentTime - startTime;
    if (!isPaused && currentPlayhead >= timeMax - 0.1) {
      handleStop();
    }
  };

  if (isPaused) {
    startTime = audioCtx.currentTime - pauseOffset;
    sourceNode.start(0, pauseOffset);
    isPaused = false;
  } else {
    startTime = audioCtx.currentTime;
    pauseOffset = 0;
    sourceNode.start();
  }

  if (animationId) cancelAnimationFrame(animationId);
  animationId = requestAnimationFrame(animatePlayhead);
});

pauseBtn.addEventListener("click", () => {
  if (!sourceNode) return;
  pauseOffset = audioCtx.currentTime - startTime;
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
  sourceNode.stop();
  sourceNode.disconnect();
  sourceNode = null;
  isPaused = true;
});

function handleStop() {
  if (sourceNode) { sourceNode.stop(); sourceNode.disconnect(); sourceNode = null; }
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
  isPaused = false;
  pauseOffset = 0;
  startTime = 0;
  drawPianoRoll();
  drawErrorGraph();
}
stopBtn.addEventListener("click", handleStop);

function yin(buffer, sampleRate) {
  const tauMax = Math.floor(buffer.length / 2);
  const yinBuf = new Float32Array(tauMax);
  let sum = 0;
  for (let tau = 1; tau < tauMax; tau++) {
    let diff = 0;
    for (let j = 0; j < tauMax; j++) {
      const d = buffer[j] - buffer[j + tau];
      diff += d * d;
    }
    yinBuf[tau] = diff;
  }
  yinBuf[0] = 1;
  for (let tau = 1; tau < tauMax; tau++) {
    sum += yinBuf[tau];
    yinBuf[tau] *= tau / sum;
  }
  const threshold = 0.15;
  let tau = 0;
  for (let t = 2; t < tauMax; t++) {
    if (yinBuf[t] < threshold) {
      tau = t;
      while (t + 1 < tauMax && yinBuf[t + 1] < yinBuf[t]) { t++; tau = t; }
      break;
    }
  }
  if (tau === 0) return null;
  return sampleRate / tau;
}

function freqToMidi(freq) { return Math.round(69 + 12 * Math.log2(freq / 440)); }
function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }
function isBlackKey(midi) {
  const n = midi % 12;
  return (n === 1 || n === 3 || n === 6 || n === 8 || n === 10);
}

function drawKeyboard() {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  keysCtx.clearRect(0, 0, keysCanvas.width, keysCanvas.height);
  keysCtx.font = '12px sans-serif';

  let rowCount = 0;
  for (let m = maxMidi; m >= minMidi; m--) {
    const y = rowCount * rowHeight;
    const name = names[m % 12];

    keysCtx.fillStyle = isBlackKey(m) ? '#2a2a2a' : '#555';
    keysCtx.fillRect(0, y, 80, rowHeight);

    keysCtx.fillStyle = '#fff';
    keysCtx.fillText(name, 5, y + rowHeight - 4);

    if (name === 'C') {
      const octave = Math.floor(m / 12) - 1;
      keysCtx.fillStyle = '#0af';
      keysCtx.fillText("C" + octave, 40, y + rowHeight - 4);
    }
    rowCount++;
  }
}

function drawTimeline() {
  timelineCtx.clearRect(0, 0, timelineCanvas.width, timelineCanvas.height);
  timelineCtx.fillStyle = '#ccc';
  timelineCtx.font = '12px sans-serif';
  for (let t = 0; t <= timeMax; t += 0.5) {
    const x = (t / timeMax) * timelineCanvas.width;
    timelineCtx.fillText(t.toFixed(1), x, 20);
  }
}

function drawRollGrid() {
  let rowCount = 0;
  for (let m = maxMidi; m >= minMidi; m--) {
    const y = rowCount * rowHeight;
    rollCtx.fillStyle = isBlackKey(m) ? "#2a2a2a" : "#1e1e1e";
    rollCtx.fillRect(0, y, rollCanvas.width, rowHeight);
    rollCtx.strokeStyle = "#333";
    rollCtx.beginPath(); rollCtx.moveTo(0, y); rollCtx.lineTo(rollCanvas.width, y); rollCtx.stroke();
    rowCount++;
  }
}

function drawPianoRoll() {
  rollCtx.clearRect(0, 0, rollCanvas.width, rollCanvas.height);
  drawRollGrid();
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  rollCtx.font = '12px sans-serif';

  longNotes.forEach(n => {
    const x = (n.start / timeMax) * rollCanvas.width;
    const x2 = (n.end / timeMax) * rollCanvas.width;
    const w = x2 - x;
    const y = (maxMidi - n.midi) * rowHeight;

    rollCtx.fillStyle = '#0af';
    rollCtx.fillRect(x, y, w, rowHeight);

    const name = names[n.midi % 12];
    const octave = Math.floor(n.midi / 12) - 1;
    rollCtx.fillStyle = '#fff';
    rollCtx.fillText(name + octave, x + 3, y + rowHeight - 4);
  });
}

function drawErrorGraph() {
  errorCtx.clearRect(0, 0, errorCanvas.width, errorCanvas.height);
  errorCtx.fillStyle = '#fff';
  errorCtx.font = '14px sans-serif';
  errorCtx.fillText("ピッチ誤差（cent）", 10, 20);

  errorCtx.strokeStyle = '#ccc';
  errorCtx.beginPath(); errorCtx.moveTo(0, errorCanvas.height / 2); errorCtx.lineTo(errorCanvas.width, errorCanvas.height / 2); errorCtx.stroke();

  errorCtx.strokeStyle = '#f55';
  errorCtx.beginPath();
  errors.forEach((e, i) => {
    const x = (e.time / timeMax) * errorCanvas.width;
    const y = errorCanvas.height / 2 - (e.cent / maxCent) * (errorCanvas.height / 2);
    if (i === 0) errorCtx.moveTo(x, y); else errorCtx.lineTo(x, y);
  });
  errorCtx.stroke();
}

function drawPlayhead() {
  if (!audioCtx || startTime === 0) return;
  const playPos = (isPaused ? pauseOffset : audioCtx.currentTime - startTime);
  if (playPos < 0 || playPos > timeMax) return;
  const x = (playPos / timeMax) * rollCanvas.width;
  rollCtx.strokeStyle = '#ff0'; rollCtx.lineWidth = 2;
  rollCtx.beginPath(); rollCtx.moveTo(x, 0); rollCtx.lineTo(x, rollCanvas.height); rollCtx.stroke();
}

function animatePlayhead() {
  drawPianoRoll(); drawPlayhead(); drawErrorGraph();
  if (startTime !== 0 && !isPaused) animationId = requestAnimationFrame(animatePlayhead);
}
</script>
</body>
</html>
